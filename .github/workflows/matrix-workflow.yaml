name: Matrix workflow
on: push
jobs:
    deployment:
        strategy:
            matrix:
                os: [ubuntu-latest , windows-latest , ubuntu-20.04]
                image: [hello-world , apline]
        runs-on: ${{ matrix.os }}
        steps:
            - name: Run ${{matrix.image}} on ${{ matrix.os }}
              run: docker run ${{ matrix.image }}

      


